; PlatformIO project configuration for the RuView CSI Node firmware
; https://docs.platformio.org/en/latest/
;
; Build with: pio run
; Upload with: pio run --target upload
; Monitor with: pio device monitor

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial monitor baud rate (must match SERIAL_BAUD in csi_node.ino)
monitor_speed = 921600

; Optimise for speed so the ISR-driven CSI callback can keep up
build_flags =
    -O2
    -DCORE_DEBUG_LEVEL=1

; ESP-IDF version that supports esp_wifi_set_csi_rx_cb
platform_packages =
    framework-arduinoespressif32 @ ~3.20014.0
